name: Quality Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Start app and run structure audit (includes blog-sunset 410 gate)
        shell: bash
        run: |
          npm run start -- --hostname 127.0.0.1 --port 3000 > /tmp/next-start.log 2>&1 &
          SERVER_PID=$!

          cleanup() {
            if kill -0 "$SERVER_PID" >/dev/null 2>&1; then
              kill "$SERVER_PID"
            fi
          }
          trap cleanup EXIT

          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3000 >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done

          if ! curl -fsS http://127.0.0.1:3000 >/dev/null 2>&1; then
            echo "Server did not become ready in time."
            cat /tmp/next-start.log
            exit 1
          fi

          node scripts/audit-structure.js --base=http://127.0.0.1:3000 --timeout=15000 --max-redirects=5 --report=reports/performance/structure-audit-ci.json
